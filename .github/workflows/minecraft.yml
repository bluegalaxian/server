name: PaperMC Server + Stable Plugins + Cloudflare Tunnel

on:
  workflow_dispatch:

jobs:
  server:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jre wget curl unzip

      - name: Setup PaperMC Server
        run: |
          mkdir mc
          cd mc

          wget -O server.jar https://api.papermc.io/v2/projects/paper/versions/1.20.4/builds/400/downloads/paper-1.20.4-400.jar

          echo "eula=true" > eula.txt
          mkdir -p plugins

      - name: Download Plugins (STABLE ONLY)
        run: |
          cd mc/plugins

          # EssentialsX (ONLY stable GitHub release assets)
          wget -O EssentialsX.jar https://github.com/EssentialsX/Essentials/releases/download/2.21.0/EssentialsX-2.21.0.jar
          wget -O EssentialsXChat.jar https://github.com/EssentialsX/Essentials/releases/download/2.21.0/EssentialsXChat-2.21.0.jar
          wget -O EssentialsXSpawn.jar https://github.com/EssentialsX/Essentials/releases/download/2.21.0/EssentialsXSpawn-2.21.0.jar

          # ViaVersion (SAFE fallback: GitHub releases, NOT Hangar)
          wget -O ViaVersion.jar https://github.com/ViaVersion/ViaVersion/releases/latest/download/ViaVersion.jar
          wget -O ViaBackwards.jar https://github.com/ViaVersion/ViaBackwards/releases/latest/download/ViaBackwards.jar
          wget -O ViaRewind.jar https://github.com/ViaVersion/ViaRewind/releases/latest/download/ViaRewind.jar

          # AuthMe Reloaded (stable CI fallback)
          wget -O AuthMe.jar https://ci.codemc.io/job/AuthMe/job/AuthMeReloaded/lastSuccessfulBuild/artifact/target/AuthMe.jar

      - name: Install Cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Start Server + Tunnel
        run: |
          cd mc

          java -Xmx2G -Xms1G -jar server.jar nogui &

          sleep 20

          cloudflared tunnel --no-autoupdate run --token ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
