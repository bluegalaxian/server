name: Temporary Minecraft Server

on:
  workflow_dispatch:

jobs:
  server:
    runs-on: ubuntu-latest

    steps:
      - name: Install Java
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jre wget curl

      - name: Setup server
        run: |
          mkdir mc
          cd mc
          wget -O server.jar https://api.papermc.io/v2/projects/paper/versions/1.20.4/builds/400/downloads/paper-1.20.4-400.jar
          echo "eula=true" > eula.txt

      - name: Install cloudflared
        run: |
          wget -O cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Start server + tunnel
        run: |
          cd mc

          # start minecraft
          java -Xmx1G -Xms1G -jar server.jar nogui &

          sleep 10

          # start PUBLIC tunnel (NO TOKEN REQUIRED)
          cloudflared tunnel --url http://localhost:25565
