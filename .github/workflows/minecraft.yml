name: PaperMC Server + Plugins + Tunnel

on:
  workflow_dispatch:

jobs:
  server:
    runs-on: ubuntu-latest

    steps:
      - name: Install Java
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jre wget curl unzip

      - name: Setup PaperMC Server
        run: |
          mkdir mc
          cd mc

          wget -O server.jar https://api.papermc.io/v2/projects/paper/versions/1.20.4/builds/400/downloads/paper-1.20.4-400.jar

          echo "eula=true" > eula.txt

          mkdir -p plugins

      - name: Download Plugins
        run: |
          cd mc/plugins

          # EssentialsX
          wget -O EssentialsX.jar https://github.com/EssentialsX/Essentials/releases/latest/download/EssentialsX.jar
          wget -O EssentialsXChat.jar https://github.com/EssentialsX/Essentials/releases/latest/download/EssentialsXChat.jar
          wget -O EssentialsXSpawn.jar https://github.com/EssentialsX/Essentials/releases/latest/download/EssentialsXSpawn.jar

          # AuthMe Reloaded
          wget -O AuthMe.jar https://ci.codemc.io/job/AuthMe/job/AuthMeReloaded/lastSuccessfulBuild/artifact/target/AuthMe-*.jar || true

          # ViaVersion
          wget -O ViaVersion.jar https://ci.viaversion.com/job/ViaVersion/lastSuccessfulBuild/artifact/build/libs/ViaVersion.jar

          # ViaBackwards
          wget -O ViaBackwards.jar https://ci.viaversion.com/job/ViaBackwards/lastSuccessfulBuild/artifact/build/libs/ViaBackwards.jar

          # ViaRewind
          wget -O ViaRewind.jar https://ci.viaversion.com/job/ViaRewind/lastSuccessfulBuild/artifact/build/libs/ViaRewind.jar

      - name: Install Cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Start Server + Tunnel
        run: |
          cd mc

          java -Xmx2G -Xms1G -jar server.jar nogui &

          sleep 20

          cloudflared tunnel run --token ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
