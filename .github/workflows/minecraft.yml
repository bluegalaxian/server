name: PaperMC Server + Hangar Plugins + Cloudflare Tunnel

on:
  workflow_dispatch:

jobs:
  server:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jre wget curl unzip

      - name: Setup PaperMC Server
        run: |
          mkdir mc
          cd mc

          wget -O server.jar https://api.papermc.io/v2/projects/paper/versions/1.20.4/builds/400/downloads/paper-1.20.4-400.jar

          echo "eula=true" > eula.txt
          mkdir -p plugins

      - name: Download Plugins (HANGAR ONLY)
        run: |
          cd mc/plugins

          # ViaVersion (Hangar official CDN)
          wget -O ViaVersion.jar https://hangarcdn.papermc.io/plugins/ViaVersion/ViaVersion/versions/latest/PAPER

          wget -O ViaBackwards.jar https://hangarcdn.papermc.io/plugins/ViaVersion/ViaBackwards/versions/latest/PAPER

          wget -O ViaRewind.jar https://hangarcdn.papermc.io/plugins/ViaVersion/ViaRewind/versions/latest/PAPER

          # AuthMe Reloaded is NOT on Hangar → must use stable CI fallback
          wget -O AuthMe.jar https://ci.codemc.io/job/AuthMe/job/AuthMeReloaded/lastSuccessfulBuild/artifact/target/AuthMe.jar

      - name: Install Cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Start Server + Tunnel
        run: |
          cd mc

          java -Xmx2G -Xms1G -jar server.jar nogui &

          sleep 20

          cloudflared tunnel --no-autoupdate run --token ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
