name: Minecraft Server + Cloudflare Tunnel

on:
  workflow_dispatch:

jobs:
  server:
    runs-on: ubuntu-latest

    steps:
      - name: Install Java + tools
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jre wget curl

      - name: Create server folder
        run: mkdir mc

      - name: Download PaperMC 1.20.4
        run: |
          cd mc
          wget -O server.jar https://api.papermc.io/v2/projects/paper/versions/1.20.4/builds/400/downloads/paper-1.20.4-400.jar
          echo "eula=true" > eula.txt

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Validate token
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}" ]; then
            echo "ERROR: Missing Cloudflare token"
            exit 1
          fi

      - name: Start Minecraft + Tunnel
        run: |
          cd mc

          # start server
          java -Xmx2G -Xms1G -jar server.jar nogui &

          # wait for server startup
          sleep 30

          # start tunnel
          cloudflared tunnel --no-autoupdate run --token "${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}"
