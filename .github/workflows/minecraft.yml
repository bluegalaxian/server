name: PaperMC Server + Hangar Plugins + Cloudflare Tunnel

on:
  workflow_dispatch:

jobs:
  server:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jre wget curl unzip

      - name: Setup PaperMC Server
        run: |
          mkdir mc
          cd mc

          wget -O server.jar https://api.papermc.io/v2/projects/paper/versions/1.20.4/builds/400/downloads/paper-1.20.4-400.jar

          echo "eula=true" > eula.txt
          mkdir -p plugins

      - name: Download Plugins (HANGAR STABLE LINKS)
        run: |
          cd mc/plugins

          # NOTE:
          # These are direct Hangar download endpoints for stable plugin builds

          # EssentialsX (still not on Hangar, so we keep official stable GitHub release)
          wget -O EssentialsX.jar https://github.com/EssentialsX/Essentials/releases/download/2.21.0/EssentialsX-2.21.0.jar
          wget -O EssentialsXChat.jar https://github.com/EssentialsX/Essentials/releases/download/2.21.0/EssentialsXChat-2.21.0.jar
          wget -O EssentialsXSpawn.jar https://github.com/EssentialsX/Essentials/releases/download/2.21.0/EssentialsXSpawn-2.21.0.jar

          # ViaVersion family (Hangar official pages)
          wget -O ViaVersion.jar https://hangar.papermc.io/api/v1/projects/ViaVersion/ViaVersion/latest/download
          wget -O ViaBackwards.jar https://hangar.papermc.io/api/v1/projects/ViaVersion/ViaBackwards/latest/download
          wget -O ViaRewind.jar https://hangar.papermc.io/api/v1/projects/ViaVersion/ViaRewind/latest/download

          # AuthMe Reloaded (NOT on Hangar → stable Spigot CI fallback)
          wget -O AuthMe.jar https://ci.codemc.io/job/AuthMe/job/AuthMeReloaded/lastSuccessfulBuild/artifact/target/AuthMe.jar

      - name: Install Cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Start Server + Tunnel
        run: |
          cd mc

          java -Xmx2G -Xms1G -jar server.jar nogui &

          sleep 20

          cloudflared tunnel --no-autoupdate run --token ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
