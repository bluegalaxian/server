name: Minecraft Server + Tunnel (Temporary)

on:
  workflow_dispatch:

jobs:
  server:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jre wget curl

      - name: Create server folder
        run: mkdir mc

      - name: Download PaperMC server
        run: |
          cd mc
          wget -O server.jar https://api.papermc.io/v2/projects/paper/versions/1.20.4/builds/400/downloads/paper-1.20.4-400.jar
          echo "eula=true" > eula.txt

      - name: Install Cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Start Minecraft Server + Tunnel
        run: |
          cd mc

          # Start Minecraft server in background
          java -Xmx1G -Xms1G -jar server.jar nogui &
          
          # Start tunnel (REPLACE TOKEN BELOW)
          cloudflared tunnel run --token ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
